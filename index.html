<title>AMR SAV — Démo back-office (maquette)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<style>
:root{
  --accent:#EF7814; --accent-ink:#C2410C; --accent-soft:#FDF0E3;
  --structure:#005EAB; --link:#165EAA; --cyan:#00AFEC;
  --bg:#F7F6F3; --panel:#FFFFFF; --hover:#F4F1EB; --tint:#F8F6F2;
  --text:#1E2833; --muted:#6E7A87; --border:#E8E4DD; --border-soft:#F0EDE7;
  --ok:#178457; --ok-soft:#E4F4EC; --warn:#B4540A; --danger:#C0362C;
  --shadow:0 1px 2px rgba(24,22,16,.04),0 10px 28px -14px rgba(24,22,16,.14);
  --r:16px;
}
@media (prefers-color-scheme: dark){:root{
  --accent:#F58A33; --accent-ink:#F6A05C; --accent-soft:#32210F;
  --structure:#4D9FE8; --link:#6FB3F0; --cyan:#38C2F5;
  --bg:#11161D; --panel:#191F28; --hover:#202834; --tint:#1D242E;
  --text:#EBEFF4; --muted:#93A0AD; --border:#2A323D; --border-soft:#232B35;
  --ok:#4CC08A; --ok-soft:#132A1F; --warn:#F0A05C; --danger:#F29A93;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 28px -14px rgba(0,0,0,.5);
}}
:root[data-theme="dark"]{
  --accent:#F58A33; --accent-ink:#F6A05C; --accent-soft:#32210F;
  --structure:#4D9FE8; --link:#6FB3F0; --cyan:#38C2F5;
  --bg:#11161D; --panel:#191F28; --hover:#202834; --tint:#1D242E;
  --text:#EBEFF4; --muted:#93A0AD; --border:#2A323D; --border-soft:#232B35;
  --ok:#4CC08A; --ok-soft:#132A1F; --warn:#F0A05C; --danger:#F29A93;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 28px -14px rgba(0,0,0,.5);
}
:root[data-theme="light"]{
  --accent:#EF7814; --accent-ink:#C2410C; --accent-soft:#FDF0E3;
  --structure:#005EAB; --link:#165EAA; --cyan:#00AFEC;
  --bg:#F7F6F3; --panel:#FFFFFF; --hover:#F4F1EB; --tint:#F8F6F2;
  --text:#1E2833; --muted:#6E7A87; --border:#E8E4DD; --border-soft:#F0EDE7;
  --ok:#178457; --ok-soft:#E4F4EC; --warn:#B4540A; --danger:#C0362C;
  --shadow:0 1px 2px rgba(24,22,16,.04),0 10px 28px -14px rgba(24,22,16,.14);
}
*{box-sizing:border-box} html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--text);font:14.5px/1.55 "Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased}
h1,h2,h3{font-family:"Space Grotesk","Avenir Next","Helvetica Neue",Arial,sans-serif;letter-spacing:-.01em}
button{font:inherit;cursor:pointer} input,select,textarea{font:inherit;color:var(--text)}
a{color:var(--link)}
.layout{display:flex;min-height:100vh}
/* ---------- sidebar (blanche, item actif pilule orange — style cockpit Darkin) ---------- */
.side{width:232px;flex:0 0 232px;background:var(--panel);border-right:1px solid var(--border-soft);display:flex;flex-direction:column;padding:1.1rem .9rem;position:sticky;top:0;height:100vh}
.brand{padding:.1rem .4rem 1.1rem;border-bottom:1px solid var(--border-soft);margin-bottom:.9rem}
.brand img{height:52px;display:block}
.brand .tag{display:inline-block;margin-top:.45rem;font-size:.68rem;font-weight:600;letter-spacing:.14em;color:var(--muted)}
.nav{display:flex;flex-direction:column;gap:.15rem}
.nav button{display:flex;align-items:center;gap:.65rem;background:none;border:0;color:var(--muted);padding:.58rem .7rem;border-radius:11px;text-align:left;width:100%;font-weight:500}
.nav button:hover{background:var(--hover);color:var(--text)}
.nav button.active{background:var(--accent-soft);color:var(--accent-ink);font-weight:600}
.side .foot{margin-top:auto;font-size:.72rem;color:var(--muted);padding:.8rem .5rem 0;border-top:1px solid var(--border-soft)}
/* ---------- topbar ---------- */
.main{flex:1;min-width:0;padding:1.25rem 1.9rem 3rem}
.appbar{display:flex;align-items:center;gap:.9rem;margin-bottom:1.4rem}
.appbar .search{flex:1;max-width:430px;position:relative}
.appbar .search input{width:100%;border:1px solid var(--border);background:var(--panel);border-radius:12px;padding:.55rem .9rem .55rem 2.2rem;box-shadow:none}
.appbar .search::before{content:"🔎";position:absolute;left:.7rem;top:50%;transform:translateY(-50%);font-size:.8rem;opacity:.6}
.demo-tag{font-size:.72rem;font-weight:600;color:var(--warn);background:var(--accent-soft);border-radius:99px;padding:.3rem .7rem;white-space:nowrap}
.iconbtn{border:1px solid var(--border);background:var(--panel);border-radius:11px;width:2.35rem;height:2.35rem;display:flex;align-items:center;justify-content:center}
.userchip{display:flex;align-items:center;gap:.6rem;border:1px solid var(--border);background:var(--panel);border-radius:12px;padding:.32rem .75rem .32rem .38rem}
.userchip .ava{width:1.9rem;height:1.9rem;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem}
.userchip b{display:block;font-size:.8rem;line-height:1.15}
.userchip span{font-size:.68rem;color:var(--muted)}
/* ---------- en-têtes de page ---------- */
.topbar{display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;margin-bottom:1.2rem;flex-wrap:wrap}
.topbar h1{margin:0;font-size:1.45rem;font-weight:650}
.topbar .sub{color:var(--muted);font-size:.85rem;margin-top:.15rem}
.btn{border:1px solid var(--border);background:var(--panel);border-radius:11px;padding:.52rem .95rem;color:var(--text);font-weight:500}
.btn:hover{background:var(--hover)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;box-shadow:0 6px 16px -8px rgba(239,120,20,.55)}
.btn.primary:hover{filter:brightness(1.06);background:var(--accent)}
.btn.small{padding:.32rem .65rem;font-size:.8rem;border-radius:9px}
/* ---------- cartes & stats ---------- */
.grid{display:grid;gap:1rem}
.stats{grid-template-columns:repeat(auto-fit,minmax(170px,1fr))}
.card{background:var(--panel);border:1px solid var(--border-soft);border-radius:var(--r);padding:1.15rem;box-shadow:var(--shadow)}
.stat{display:flex;flex-direction:column;gap:.35rem}
.stat .ic{width:2.3rem;height:2.3rem;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1rem;margin-bottom:.2rem}
.stat b{font-size:1.7rem;font-weight:700;font-variant-numeric:tabular-nums;line-height:1.1}
.stat span{color:var(--muted);font-size:.8rem}
.stat .trend{font-size:.74rem;color:var(--ok);font-weight:600}
.stat.hero{background:var(--accent);border-color:var(--accent);color:#fff}
.stat.hero .ic{background:rgba(255,255,255,.22)}
.stat.hero span,.stat.hero .trend{color:rgba(255,255,255,.85)}
.two-col{grid-template-columns:2fr 1fr}
@media(max-width:1000px){.two-col{grid-template-columns:1fr}}
.card h3{margin:.05rem 0 .8rem;font-size:.98rem;font-weight:650}
/* ---------- filtres & tableaux ---------- */
.filters{display:flex;gap:.55rem;flex-wrap:wrap;margin-bottom:.9rem}
.filters input,.filters select{border:1px solid var(--border);background:var(--panel);border-radius:11px;padding:.5rem .8rem}
.filters input{min-width:230px}
table{border-collapse:collapse;width:100%;font-size:.86rem}
.tablewrap{overflow-x:auto;background:var(--panel);border:1px solid var(--border-soft);border-radius:var(--r);box-shadow:var(--shadow)}
th{text-align:left;padding:.65rem .85rem;white-space:nowrap;color:var(--muted);font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border-soft);font-weight:600}
td{padding:.68rem .85rem;border-top:1px solid var(--border-soft);vertical-align:middle}
tbody tr{cursor:pointer} tbody tr:hover{background:var(--hover)}
.num{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-weight:600;white-space:nowrap;font-size:.82rem}
.chip{display:inline-block;padding:.22em .7em;border-radius:99px;font-size:.75rem;font-weight:600;white-space:nowrap}
.prio{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.prio.haute{color:var(--warn)} .prio.urgente{color:var(--danger)} .prio.normale{color:var(--muted)} .prio.basse{color:var(--muted);opacity:.65}
/* ---------- détail ---------- */
.backlink{background:none;border:0;color:var(--muted);padding:0;margin-bottom:.7rem;font-size:.85rem}
.backlink:hover{color:var(--link)}
.dethead{display:flex;justify-content:space-between;gap:1rem;flex-wrap:wrap;align-items:flex-start}
.dethead .who{color:var(--muted);font-size:.84rem;margin-top:.3rem}
.tabs{display:flex;gap:.2rem;border-bottom:1px solid var(--border);margin:1.05rem 0 1rem;flex-wrap:wrap}
.tabs button{background:none;border:0;padding:.5rem .85rem;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;font-weight:500}
.tabs button.active{color:var(--accent-ink);font-weight:600;border-bottom-color:var(--accent)}
.timeline{list-style:none;margin:0;padding:0}
.timeline li{position:relative;padding:0 0 1.05rem 1.5rem;border-left:2px solid var(--border);margin-left:.4rem}
.timeline li::before{content:"";position:absolute;left:-6px;top:.28em;width:10px;height:10px;border-radius:50%;background:var(--muted)}
.timeline li.pub::before{background:var(--accent)}
.timeline .t{color:var(--muted);font-size:.74rem}
.tagpub{font-size:.66rem;color:var(--accent-ink);background:var(--accent-soft);border-radius:99px;padding:.1em .55em;font-weight:600}
.devicebox{border:1px solid var(--border-soft);border-radius:13px;padding:.85rem 1rem;margin-bottom:.7rem;background:var(--tint)}
.devicebox b{display:block}
.kv{color:var(--muted);font-size:.8rem}
.msg{max-width:75%;padding:.55rem .85rem;border-radius:14px;margin:.4rem 0;font-size:.86rem;box-shadow:var(--shadow)}
.msg.client{background:var(--panel);border:1px solid var(--border-soft);border-bottom-left-radius:4px}
.msg.staff{background:var(--accent-soft);margin-left:auto;border-bottom-right-radius:4px}
.msg .t{display:block;font-size:.68rem;color:var(--muted);margin-top:.2rem}
/* ---------- formulaire fiche ---------- */
.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:.9rem}
@media(max-width:860px){.formgrid{grid-template-columns:1fr}}
.field label{display:block;font-size:.75rem;font-weight:600;color:var(--muted);margin-bottom:.3rem}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--border);background:var(--panel);border-radius:11px;padding:.52rem .75rem}
.field textarea{min-height:72px;resize:vertical}
fieldset{border:1px solid var(--border-soft);border-radius:var(--r);margin:0 0 1rem;padding:1rem 1.15rem 1.1rem;background:var(--panel);box-shadow:var(--shadow)}
legend{font-weight:650;font-size:.8rem;padding:0 .5rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;font-family:"Space Grotesk","Avenir Next",sans-serif}
.techs{display:flex;gap:.9rem;flex-wrap:wrap}
.techs label,.svc label{font-weight:normal;display:flex;align-items:center;gap:.45rem;font-size:.88rem}
input[type=checkbox],input[type=radio]{accent-color:var(--accent);width:1.05em;height:1.05em}
.svc{display:flex;flex-direction:column;gap:.45rem}
.svc .price{color:var(--muted);font-size:.78rem;margin-left:auto}
.svcrow{display:flex;align-items:center;gap:.5rem;border:1px solid var(--border-soft);border-radius:11px;padding:.5rem .8rem;background:var(--tint)}
.sig{border:1.5px dashed var(--border);border-radius:13px;background:var(--panel);touch-action:none;width:100%;height:160px;display:block}
.sighint{color:var(--muted);font-size:.78rem;margin:.35rem 0 0}
/* ---------- rdv ---------- */
.rdv{display:flex;gap:.85rem;align-items:center;border:1px solid var(--border-soft);border-radius:13px;padding:.75rem .95rem;margin-bottom:.6rem;background:var(--panel);box-shadow:var(--shadow)}
.rdv .h{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-weight:700;color:var(--text);white-space:nowrap;background:var(--tint);border-radius:9px;padding:.25rem .5rem;font-size:.82rem}
.rdv .type{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--accent-ink)}
/* ---------- vue client ---------- */
.phoneframe{max-width:420px;margin:0 auto;border:1px solid var(--border-soft);border-radius:26px;overflow:hidden;box-shadow:var(--shadow);background:var(--panel)}
.pubhead{background:var(--structure);color:#fff;padding:1.15rem 1.3rem}
.pubhead .n{font-family:ui-monospace,monospace;font-size:1.1rem;font-weight:700}
.pubbody{padding:1.05rem 1.3rem 1.3rem}
.statebig{display:inline-block;padding:.3em .95em;border-radius:99px;font-weight:650;margin:.45rem 0;font-size:.9rem}
/* ---------- toast + modal ---------- */
#toasts{position:fixed;bottom:1rem;right:1rem;display:flex;flex-direction:column;gap:.5rem;z-index:50}
.toast{background:var(--text);color:var(--bg);padding:.6rem 1rem;border-radius:12px;font-size:.85rem;box-shadow:var(--shadow);animation:pop .18s ease-out}
@keyframes pop{from{transform:translateY(8px);opacity:0}}
@media (prefers-reduced-motion: reduce){.toast{animation:none}}
.overlay{position:fixed;inset:0;background:rgba(15,20,26,.45);display:flex;align-items:center;justify-content:center;z-index:40;padding:1rem}
.wa{background:#E5DDD5;border-radius:18px;max-width:360px;width:100%;overflow:hidden;box-shadow:var(--shadow)}
:root[data-theme="dark"] .wa{background:#1F2C33}
.wa .wahead{background:#075E54;color:#fff;padding:.75rem 1rem;display:flex;align-items:center;gap:.6rem;font-weight:600}
.wa .wahead .ava{width:2em;height:2em;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center}
.wa .wabody{padding:1rem}
.bubble{background:#fff;color:#111;border-radius:0 12px 12px 12px;padding:.65rem .85rem;font-size:.85rem;white-space:pre-line;box-shadow:0 1px 1px rgba(0,0,0,.12);max-width:95%}
:root[data-theme="dark"] .bubble{background:#2A3942;color:#E6EDF4}
.bubble .wt{display:block;text-align:right;font-size:.68rem;color:#667;margin-top:.2rem}
.wa .waclose{display:block;margin:.8rem auto 1rem;background:#075E54;color:#fff;border:0;border-radius:10px;padding:.45rem 1.2rem}
/* mobile */
@media(max-width:820px){
  .layout{flex-direction:column}
  .side{width:auto;height:auto;position:static;flex-direction:row;align-items:center;padding:.55rem .7rem;overflow-x:auto;border-right:0;border-bottom:1px solid var(--border-soft)}
  .brand{padding:0 .8rem 0 .2rem;border:0;margin:0}
  .brand img{height:34px}
  .brand .tag{display:none}
  .nav{flex-direction:row}
  .nav button{white-space:nowrap;padding:.45rem .6rem}
  .side .foot{display:none}
  .main{padding:1rem}
  .appbar .search{max-width:none}
  .userchip b,.userchip span{display:none}
}
:focus-visible{outline:3px solid var(--accent);outline-offset:2px;border-radius:4px}

/* ====== v4 : dégradés, animations, profil sidebar ====== */
body{background:var(--bg) radial-gradient(1100px 420px at 75% -12%, rgba(239,120,20,.05), transparent 70%) no-repeat}
.card,.btn,.iconbtn,.nav button,.rdv,.svcrow,.tabs button{transition:box-shadow .22s ease,transform .22s ease,background .16s ease,border-color .16s ease,color .16s ease}
.grid .card:hover{transform:translateY(-2px);box-shadow:0 2px 4px rgba(24,22,16,.05),0 18px 38px -16px rgba(24,22,16,.2)}
.stat.hero{background:linear-gradient(135deg,#F9942F 0%,#EF7814 55%,#E25F00 100%);position:relative;overflow:hidden}
.stat.hero::after{content:"";position:absolute;right:-46px;top:-46px;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,.14);filter:blur(2px)}
.stat.hero::before{content:"";position:absolute;right:8px;bottom:-58px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.08)}
.btn.primary{background:linear-gradient(135deg,#F9942F,#EF7814 70%);border-color:transparent}
.btn.primary:hover{filter:none;background:linear-gradient(135deg,#FA9E42,#F07F1F 70%);transform:translateY(-1px);box-shadow:0 10px 22px -8px rgba(239,120,20,.55)}
.btn,.iconbtn{display:inline-flex;align-items:center;gap:.45rem;justify-content:center}
.btn svg,.nav svg,.iconbtn svg{flex:0 0 auto}
.pubhead{background:linear-gradient(135deg,#0B72C4,#005EAB 60%,#004A87)}
.main.anim{animation:fadeUp .28s ease-out}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
.nav button{position:relative}
.nav button.active{box-shadow:inset 0 0 0 1px rgba(239,120,20,.18)}
tbody tr td{transition:background .14s ease}
.timeline li::before{transition:transform .2s ease}
.timeline li:hover::before{transform:scale(1.25)}
/* profil + notifications — en bas de la sidebar, alignés à gauche */
.sideuser{display:flex;align-items:center;gap:.6rem;margin-top:auto;padding:.7rem .5rem .55rem;border-top:1px solid var(--border-soft)}
.sideuser .ava{width:2.15rem;height:2.15rem;border-radius:50%;background:linear-gradient(135deg,#F9942F,#EF7814);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;flex:0 0 auto}
.sideuser .who b{display:block;font-size:.8rem;line-height:1.15}
.sideuser .who span{font-size:.68rem;color:var(--muted)}
.sideuser .iconbtn{margin-left:auto;width:2.1rem;height:2.1rem;position:relative}
.sideuser .iconbtn .dotn{position:absolute;top:.35rem;right:.4rem;width:.44rem;height:.44rem;border-radius:50%;background:var(--accent);box-shadow:0 0 0 2px var(--panel)}
.side .foot{margin-top:0;border-top:0;padding-top:.45rem}
.search .sic{position:absolute;left:.72rem;top:50%;transform:translateY(-50%);color:var(--muted);display:flex}
.appbar .search input{padding-left:2.25rem}
.demo-tag{letter-spacing:.06em}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
@media(max-width:820px){.sideuser{margin:0 0 0 auto;padding:0;border:0}.sideuser .who{display:none}}

/* ====== v5 : plus d'animations, plus de dégradés ====== */
body{background:
  radial-gradient(1100px 420px at 78% -12%, rgba(239,120,20,.07), transparent 70%),
  radial-gradient(900px 500px at -10% 110%, rgba(0,94,171,.05), transparent 65%),
  var(--bg)}
.side{background:linear-gradient(180deg,var(--panel) 72%, rgba(239,120,20,.035))}
.nav button.active{background:linear-gradient(90deg,var(--accent-soft),rgba(239,120,20,.06))}
.nav button svg{transition:transform .2s ease}
.nav button:hover svg{transform:translateX(2px) scale(1.06)}
th{background:linear-gradient(180deg,var(--tint),transparent)}
.demo-tag{background:linear-gradient(135deg,var(--accent-soft),rgba(239,120,20,.09))}
.stat .ic{background-image:linear-gradient(135deg,rgba(255,255,255,.55),transparent);transition:transform .25s ease}
.card:hover .ic{transform:scale(1.08) rotate(-3deg)}
.stat.hero .ic{animation:pulseIc 3.2s ease-in-out infinite}
@keyframes pulseIc{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.stat.hero::after{animation:floaty 6s ease-in-out infinite alternate}
.stat.hero::before{animation:floaty 8s ease-in-out infinite alternate-reverse}
@keyframes floaty{from{transform:translate(0,0)}to{transform:translate(-8px,8px)}}
.rdv .h{background:linear-gradient(135deg,var(--tint),var(--hover))}
.statebig{background-image:linear-gradient(135deg,rgba(255,255,255,.35),transparent)}
.btn{will-change:transform}
.btn:active,.iconbtn:active,.nav button:active{transform:scale(.96)}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 16px -10px rgba(24,22,16,.25)}
.iconbtn:hover{transform:translateY(-1px)}
.iconbtn:hover svg{animation:ring .5s ease}
@keyframes ring{0%{transform:rotate(0)}25%{transform:rotate(-13deg)}55%{transform:rotate(11deg)}80%{transform:rotate(-6deg)}100%{transform:rotate(0)}}
/* entrées en cascade */
.anim .stats>.card,.anim .two-col>.card{animation:fadeUp .45s ease-out backwards}
.anim .stats>.card:nth-child(2),.anim .two-col>.card:nth-child(2){animation-delay:.07s}
.anim .stats>.card:nth-child(3){animation-delay:.14s}
.anim .stats>.card:nth-child(4){animation-delay:.21s}
.anim tbody tr{animation:fadeUp .4s ease-out backwards}
.anim tbody tr:nth-child(1){animation-delay:.05s}.anim tbody tr:nth-child(2){animation-delay:.1s}
.anim tbody tr:nth-child(3){animation-delay:.15s}.anim tbody tr:nth-child(4){animation-delay:.2s}
.anim tbody tr:nth-child(5){animation-delay:.25s}.anim tbody tr:nth-child(6){animation-delay:.3s}
.anim tbody tr:nth-child(n+7){animation-delay:.34s}
.anim .rdv{animation:fadeUp .45s ease-out backwards}
.anim .rdv:nth-child(2){animation-delay:.08s}.anim .rdv:nth-child(3){animation-delay:.16s}.anim .rdv:nth-child(4){animation-delay:.24s}
.anim .timeline li{animation:fadeUp .4s ease-out backwards}
.anim .timeline li:nth-child(1){animation-delay:.04s}.anim .timeline li:nth-child(2){animation-delay:.09s}
.anim .timeline li:nth-child(3){animation-delay:.14s}.anim .timeline li:nth-child(4){animation-delay:.19s}
.anim .timeline li:nth-child(n+5){animation-delay:.24s}
.anim fieldset{animation:fadeUp .45s ease-out backwards}
.anim fieldset:nth-of-type(2){animation-delay:.07s}.anim fieldset:nth-of-type(3){animation-delay:.14s}

        <button class="btn primary" onclick="assignTask()">${svg("send",15)} Assigner & notifier</button>
        <p class="kv" style="margin-top:.7rem">Le collègue reçoit la notification dans sa cloche (+ e-mail/push selon ses préférences).</p>
      </div>
    </div>`;
  }
  else if(view==="reglages"){
    M.innerHTML=banner+`<div class="topbar"><h1>Statuts personnalisables</h1><div class="sub">Libellés, couleurs, notifications — modifiables sans développeur</div></div>
    <div class="tablewrap"><table><thead><tr><th>Statut</th><th>Couleur</th><th>Visible client</th><th>Notifier client</th><th>Notifier Tolgahan (WhatsApp)</th></tr></thead><tbody>
    ${Object.entries(STATUTS).map(([k,s])=>`<tr onclick="toast('En version finale : édition complète du statut ✏️')"><td><b>${s.l}</b></td><td><span class="chip" style="background:${((isDark()&&s.cd)||s.c)}1E;color:${(isDark()&&s.cd)||s.c}">⬤ ${s.c}</span></td>
      <td>${["clos","annule"].includes(k)?"—":"✔"}</td><td>${["pret","devis","livre"].includes(k)?"✔ e-mail":"selon réglage"}</td><td>${["pret","devis_ok","devis_ko","recu"].includes(k)?"✔":"—"}</td></tr>`).join("")}
    </tbody></table></div>`;
  }
  document.getElementById("brandlogo").src=isDark()?LOGO_DARK:LOGO_LIGHT;
  window.scrollTo(0,0);
  const MM=$("#main");MM.classList.remove("anim");void MM.offsetWidth;MM.classList.add("anim");
  if(view==="dash")countUp();
}

/* ============ DÉTAIL ============ */
function openD(n){current=DOSSIERS.find(d=>d.n===n);view="detail";tab="app";render()}
function renderDetail(M,banner){
  const d=current,st=STATUTS[d.statut];
  M.innerHTML=banner+`
  <button class="backlink" onclick="go('dossiers')">← Retour aux dossiers</button>
  <div class="card">
    <div class="dethead">
      <div><span class="num" style="font-size:1.15rem">${d.n}</span> ${chip(d.statut)} <span class="prio ${d.prio}">${d.prio}</span>
        <div class="who">👤 ${esc(d.client)}${d.soc?` · ${esc(d.soc)}`:""} · 📞 ${d.tel} · 🔧 ${d.tech} · ${d.kind==="sur_site"?"📍 Sur site":"🏠 Atelier"} · dépôt le ${now(d.date)} · mode <b>${d.mode}</b>${d.prive?' · <b style="color:var(--warn)">'+svg("lock",12)+' Privé — accès : '+d.acces.map(a=>a.split(" ")[1]||a).join(", ")+'</b>':""}</div></div>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap">
        ${st.next.length?`<select id="chgS" class="btn">${st.next.map(s=>`<option value="${s}">→ ${STATUTS[s].l}</option>`).join("")}</select>
        <button class="btn primary" onclick="chgStatut()">Changer le statut</button>`:""}
        <button class="btn" onclick="toast('Fiche de prise en charge PDF générée (QR + signature)')">${svg("file",15)} Fiche PDF</button>
        <button class="btn" onclick="toast('En version finale : devis / facture générés depuis les prestations')">${svg("euro",15)} Devis / Facture</button>
      </div>
    </div>
    <div class="tabs">
      ${[["app","Appareils"],["prest","Prestations ("+euro(total(d))+")"],["hist","Historique"],["msg","Messages ("+d.msgs.length+")"]].map(([k,l])=>`<button class="${tab===k?"active":""}" onclick="tab='${k}';render()">${l}</button>`).join("")}
    </div>
    <div id="tabc">${tabContent(d)}</div>
  </div>`;
}
function tabContent(d){
  if(tab==="app")return d.app.map(a=>`<div class="devicebox"><b>${esc(a.t)} — ${esc(a.m)} ${esc(a.mod)}</b>
    <span class="kv">N°/IMEI : ${esc(a.sn)} · Accessoires : ${esc(a.acc)} · Mot de passe : ${esc(a.mdp)} 🔒 (chiffré)</span></div>`).join("")
    +`<div class="formgrid"><div><b>Défauts signalés</b><p class="kv">${esc(d.defauts)}</p><b>Défauts constatés</b><p class="kv">${esc(d.constats||"—")}</p></div>
    <div><b>Travail à effectuer</b><p class="kv">${esc(d.travaux)}</p><b>Travail effectué</b><p class="kv">${esc(d.fait||"—")}</p></div></div>`;
  if(tab==="prest")return `<div class="tablewrap" style="box-shadow:none"><table class="lines"><thead><tr><th>Désignation</th><th>Qté</th><th>PU HT</th><th>Total HT</th></tr></thead>
    <tbody>${d.lignes.map(l=>`<tr><td>${esc(l.l)}</td><td>${l.q}</td><td>${euro(l.p)}</td><td>${euro(l.q*l.p)}</td></tr>`).join("")}
    <tr><td colspan="3" style="text-align:right"><b>Total HT</b></td><td><b>${euro(total(d))}</b></td></tr></tbody></table></div>`;
  if(tab==="hist")return `<ul class="timeline">${d.hist.slice().reverse().map(h=>`<li class="${h[2]?"pub":""}"><span class="t">${h[0]}</span> ${h[2]?'<span class="tagpub">visible client</span>':""}<br>${esc(h[1])}</li>`).join("")}</ul>`;
  if(tab==="msg")return (d.msgs.map(m=>`<div class="msg ${m[0]}">${esc(m[1])}<span class="t">${m[0]==="client"?"Client":"AMR"} · ${m[2]}</span></div>`).join("")||`<p class="kv">Aucun message.</p>`)
    +`<div style="display:flex;gap:.5rem;margin-top:.6rem"><input id="newmsg" placeholder="Répondre au client…" style="flex:1;border:1px solid var(--border);border-radius:8px;padding:.5rem .7rem;background:var(--panel)">
    <button class="btn primary" onclick="sendMsg()">Envoyer</button></div>`;
}
function chgStatut(){
  const d=current,to=$("#chgS").value;
  d.statut=to;
  const lbl=STATUTS[to].l;
  d.hist.push([new Date().toLocaleString("fr-FR",{dateStyle:"short",timeStyle:"short"}),`Statut → ${lbl} — par ${USER}`,1]);
  toast(`Statut changé : ${lbl} — client notifié par e-mail ✔`);
  if(["pret","devis_ok","devis_ko","recu","reparation"].includes(to)) whatsapp(d, to==="pret"?"✅ Appareil prêt — client notifié":"");
  render();
}
function sendMsg(){const v=$("#newmsg").value.trim();if(!v)return;current.msgs.push(["staff",v,"à l'instant"]);toast("Message envoyé — le client est notifié 💬");render()}

/* ============ FICHE (formulaire + signature) ============ */
let sigOK=false;
function renderFiche(M,banner){
  sigOK=false;
  M.innerHTML=banner+`
  <div class="topbar"><h1>📝 Fiche de prise en charge</h1><div class="sub">Identique à votre fiche papier — mais elle crée le dossier toute seule</div></div>
  <form onsubmit="return creerDossier(event)">
  <fieldset><legend>Identification (automatique)</legend>
    <p style="margin:.2rem 0">Créée par : <b>${USER}</b> — compte <b>${ROLE}</b>. Chaque salarié (admin, technicien, SAV, accueil) a son compte : la fiche et <b>chaque modification</b> portent automatiquement son nom — plus rien à cocher.</p>
  </fieldset>
  <fieldset><legend>Confidentialité <span class="kv">(option visible car vous êtes ${ROLE})</span></legend>
    <label><input type="checkbox" id="f-prive" onchange="document.getElementById('privlist').style.display=this.checked?'flex':'none'"> Dossier privé — accès restreint au groupe choisi</label>
    <div id="privlist" class="techs" style="display:none;margin-top:.5rem">
      ${TECHS.map(t=>`<label><input type="checkbox" class="f-acc" value="${t}" ${t===USER?"checked disabled":""}>${t}${t===USER?" (vous)":""}</label>`).join("")}
    </div>
  </fieldset>
  <fieldset><legend>Client</legend><div class="formgrid">
    <div class="field"><label>NOM Prénom *</label><input id="f-nom" required placeholder="ex. Martin BERGER"></div>
    <div class="field"><label>Téléphone *</label><input id="f-tel" required placeholder="06 …"></div>
    <div class="field"><label>Société (pro)</label><input id="f-soc" placeholder="optionnel"></div>
    <div class="field"><label>E-mail</label><input id="f-mail" type="email" placeholder="pour le suivi en ligne"></div>
  </div></fieldset>
  <fieldset><legend>Appareil</legend><div class="formgrid">
    <div class="field"><label>Type *</label><select id="f-type" onchange="majMarques()">${Object.keys(APPAREILS).map(t=>`<option>${t}</option>`).join("")}</select></div>
    <div class="field"><label>Marque *</label><select id="f-marque" onchange="majModeles()"></select></div>
    <div class="field"><label>Modèle *</label><select id="f-mod"></select></div>
    <div class="field"><label>N° de série / IMEI</label><input id="f-sn" placeholder="scan possible en version finale"></div>
    <div class="field"><label>Accessoires</label><input id="f-acc" placeholder="chargeur, housse…"></div>
    <div class="field"><label>Mot de passe appareil 🔒</label><input id="f-mdp" placeholder="stocké chiffré"></div>
  </div></fieldset>
  <fieldset><legend>Demande</legend><div class="formgrid">
    <div class="field"><label>Défauts signalés *</label><textarea id="f-def" required placeholder="décrits par le client"></textarea></div>
    <div class="field"><label>Travail à effectuer</label><textarea id="f-trav"></textarea></div>
  </div>
  <div style="display:flex;gap:1.4rem;flex-wrap:wrap;margin-top:.5rem">
    <label><input type="radio" name="mode" value="facture" checked> Facture</label>
    <label><input type="radio" name="mode" value="devis"> Devis</label>
    <label><input type="radio" name="mode" value="garantie"> Garantie</label>
    <label style="margin-left:auto"><input type="checkbox" id="f-site"> Intervention sur site (+ forfait déplacement)</label>
  </div></fieldset>
  <fieldset><legend>Prestations (catalogue — cochez)</legend><div class="svc">
    ${CATALOGUE.map(s=>`<div class="svcrow"><label style="flex:1"><input type="checkbox" class="f-svc" value="${s.id}" onchange="this.closest('.svcrow').querySelector('.f-prix').disabled=!this.checked">${s.label}</label><input type="number" class="f-prix" value="${s.prix}" min="0" step="1" disabled style="width:5.5em;border:1px solid var(--border);border-radius:6px;padding:.25rem .4rem;text-align:right;background:var(--panel)"><span class="price">€ HT${s.unit?" / "+s.unit:""} · modifiable</span></div>`).join("")}
  </div></fieldset>
  <fieldset><legend>Signature du client — prise en charge</legend>
    <canvas class="sig" id="sig" width="900" height="220"></canvas>
    <p class="sighint">Le client signe au doigt ou au stylet — la signature est horodatée et scellée avec la fiche (valeur de preuve). <button type="button" class="btn small" onclick="clearSig()">Effacer</button></p>
  </fieldset>
  <div style="display:flex;gap:.7rem;align-items:center">
    <button class="btn primary" style="font-size:1rem;padding:.7rem 1.4rem">${svg("check",16)} Créer le dossier</button>
    <span class="kv">→ n° attribué, fiche PDF + QR, client et patron notifiés</span>
  </div></form>`;
  majMarques(); initSig();
}
function majMarques(){const t=$("#f-type").value;$("#f-marque").innerHTML=Object.keys(APPAREILS[t]).map(m=>`<option>${m}</option>`).join("");majModeles()}
function majModeles(){const t=$("#f-type").value,m=$("#f-marque").value;$("#f-mod").innerHTML=APPAREILS[t][m].map(x=>`<option>${x}</option>`).join("")}
function initSig(){
  const c=$("#sig"),x=c.getContext("2d");let draw=false,px=0,py=0;
  x.lineWidth=2.2;x.lineCap="round";x.strokeStyle=getComputedStyle(document.body).color;
  const pos=e=>{const r=c.getBoundingClientRect();return[(e.clientX-r.left)*c.width/r.width,(e.clientY-r.top)*c.height/r.height]};
  c.onpointerdown=e=>{draw=true;[px,py]=pos(e);c.setPointerCapture(e.pointerId)};
  c.onpointermove=e=>{if(!draw)return;const[nx,ny]=pos(e);x.beginPath();x.moveTo(px,py);x.lineTo(nx,ny);x.stroke();[px,py]=[nx,ny];sigOK=true};
  c.onpointerup=()=>draw=false;
}
function clearSig(){const c=$("#sig");c.getContext("2d").clearRect(0,0,c.width,c.height);sigOK=false}
function creerDossier(e){
  e.preventDefault();
  if(!sigOK){toast("✍️ Faites signer le client avant de créer le dossier");return false}
  SEQ++;
  const num=`AMR-2026-00${SEQ}`;
  const svcs=[...document.querySelectorAll(".f-svc:checked")].map(cb=>{const s=CATALOGUE.find(x=>x.id===cb.value);const pi=cb.closest(".svcrow").querySelector(".f-prix");return {...s,prix:parseFloat(pi.value)||s.prix}});
  if($("#f-site").checked&&!svcs.some(s=>s.id==="depl"))svcs.push(CATALOGUE[1]);
  const d={n:num,code:Math.random().toString(36).slice(2,10).toUpperCase(),client:$("#f-nom").value,tel:$("#f-tel").value,soc:$("#f-soc").value,
    statut:"recu",prio:"normale",tech:USER,mode:document.querySelector("[name=mode]:checked").value,prive:document.getElementById("f-prive").checked,acces:[...document.querySelectorAll(".f-acc:checked")].map(c=>c.value),
    kind:$("#f-site").checked?"sur_site":"atelier",date:new Date().toISOString().slice(0,10),
    app:[{t:$("#f-type").value,m:$("#f-marque").value,mod:$("#f-mod").value,sn:$("#f-sn").value||"—",acc:$("#f-acc").value||"—",mdp:$("#f-mdp").value?"••••":"—"}],
    defauts:$("#f-def").value,travaux:$("#f-trav").value,constats:"",fait:"",
    lignes:svcs.map(s=>({l:s.label,q:1,p:s.prix})),
    hist:[[new Date().toLocaleString("fr-FR",{dateStyle:"short",timeStyle:"short"}),"Dossier créé — fiche signée ✍️ (preuve horodatée) — par "+USER,1]],msgs:[]};
  DOSSIERS.push(d);
  toast(`✅ Dossier ${num} créé — fiche PDF générée, e-mail envoyé au client`);
  whatsapp(d,"🆕 Nouvelle prise en charge");
  openD(num);
  return false;
}

/* ============ INIT ============ */
try{const t=localStorage.getItem("amrsav_theme");if(t)document.documentElement.dataset.theme=t;
if(localStorage.getItem("amrsav_side")==="1"){sideCollapsed=true;document.querySelector(".side").classList.add("collapsed")}}catch(e){}
render();
</script>
